# VMEA Configuration
# Copy to ~/.config/vmea/config.toml and customize

# =============================================================================
# Output Settings
# =============================================================================

# Where to write exported Markdown notes (required on first run)
# Supports ~ expansion
output_folder = ""

# Optional separate folder for exported audio files
# Leave empty to use output_folder/audio/
audio_output_folder = ""

# How to reference audio in exported notes
# Options: "copy", "symlink", "source-link", "app-link"
audio_export_mode = "app-link"

# Fall back to source-link if the preferred mode fails
audio_fallback_to_source_link = false

# =============================================================================
# Metadata & Frontmatter
# =============================================================================

# Default domain for all voice memos (frontmatter field)
default_domain = ""

# Date format for filenames (uses Python strftime)
filename_date_format = "%Y-%m-%d"

# =============================================================================
# Source Detection
# =============================================================================

# Override automatic source path detection (leave empty to auto-detect)
# Typical paths:
#   ~/Library/Group Containers/group.com.apple.VoiceMemos.shared/Recordings/
#   ~/Library/Application Support/com.apple.voicememos/Recordings/
source_path_override = ""

# =============================================================================
# Transcript Processing
# =============================================================================

# Include native Apple transcript in notes (when available)
include_native_transcript = true

# Transcript extraction priority
# Options: "plist", "tsrp", "both"
# - plist: manifest.plist only (older format)
# - tsrp: embedded m4a atom only (iOS 18+)
# - both: try tsrp first, fall back to plist
transcript_source_priority = "both"

# =============================================================================
# LLM Cleanup (Optional)
# =============================================================================

# Enable local LLM transcript cleanup via Ollama
# When disabled, VMEA exports using raw transcript without Ollama dependency
llm_cleanup_enabled = false

# Ollama model to use for cleanup (single model mode)
ollama_model = "llama3.2:3b"

# Cascade mode: list of models for progressive refinement
# Example: ["llama3.2:3b", "mistral:7b", "llama3.2:3b"]
# Leave empty to use single model mode
ollama_models = []

# Ollama server host
ollama_host = "http://localhost:11434"

# Timeout for Ollama requests (seconds)
ollama_timeout = 120

# Explicit path to cleanup instructions file
# If empty, searches for: cleanup_instructions.md, CLAUDE.md, GEMINI.md, README.md in output folder
cleanup_instructions_path = ""

# Fail if no instruction file found (when cleanup enabled)
fail_on_missing_instruction_file = false

# Keep the original transcript in notes when cleanup is applied
preserve_raw_transcript = true

# Ollama startup mode: "terminal_managed" or "background"
ollama_startup_mode = "terminal_managed"

# =============================================================================
# Whisper Transcription
# =============================================================================

# Whisper model size: tiny, base, small, medium, large
whisper_model = "base"

# Language for Whisper (empty = auto-detect)
whisper_language = ""

# Transcribe memos that have no native transcript
transcribe_missing = true

# =============================================================================
# Reconciliation & State
# =============================================================================

# How to handle existing notes with same memo_id
# Options: "skip", "update", "overwrite"
conflict_resolution = "update"

# State file location (relative to output_folder or absolute)
state_file = ".vmea-state.jsonl"

# =============================================================================
# Background Processing
# =============================================================================

# Debounce delay for file changes in watch mode (seconds)
watch_debounce_seconds = 5

# =============================================================================
# Advanced
# =============================================================================

# Dry run mode (no files written)
dry_run = false
